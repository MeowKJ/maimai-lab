name: CI-CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  env-contract:
    name: Env Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate env templates
        run: python apps/bot/scripts/env_contract.py

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: env-contract
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/bot/requirements.txt

      - name: Inject env vars from Doppler
        if: ${{ secrets.DOPPLER_TOKEN != '' }}
        uses: dopplerhq/secrets-fetch-action@v1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Run Python tests
        run: cd apps/bot && python -m pytest -q

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    needs: env-contract
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Inject env vars from Doppler
        if: ${{ secrets.DOPPLER_TOKEN != '' }}
        uses: dopplerhq/secrets-fetch-action@v1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Build web app
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @maimai-bot-plus/web build

  deploy-preview:
    name: Deploy Preview (Vercel)
    runs-on: ubuntu-latest
    needs:
      - python-tests
      - web-build
    if: ${{ github.event_name == 'pull_request' && secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel project settings (preview)
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build deployment artifact (preview)
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview
        run: vercel deploy --prebuilt --token="$VERCEL_TOKEN"

  deploy-production:
    name: Deploy Production (Vercel)
    runs-on: ubuntu-latest
    needs:
      - python-tests
      - web-build
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel project settings (production)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build deployment artifact (production)
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  deploy-bot-ubuntu:
    name: Deploy QQ Bot (Ubuntu)
    runs-on: ubuntu-latest
    needs:
      - python-tests
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.BOT_SSH_HOST != '' && secrets.BOT_SSH_USER != '' && secrets.BOT_SSH_KEY != '' && secrets.BOT_DEPLOY_PATH != '' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BOT_SSH_HOST }}
          username: ${{ secrets.BOT_SSH_USER }}
          key: ${{ secrets.BOT_SSH_KEY }}
          port: ${{ secrets.BOT_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.BOT_DEPLOY_PATH }}"
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main

            python3 -m venv .venv
            . .venv/bin/activate
            python -m pip install --upgrade pip
            python -m pip install -r apps/bot/requirements.txt

            if [ -n "${{ secrets.BOT_SYSTEMD_SERVICE }}" ]; then
              if sudo -n true 2>/dev/null; then
                sudo systemctl restart "${{ secrets.BOT_SYSTEMD_SERVICE }}"
                sudo systemctl --no-pager --full status "${{ secrets.BOT_SYSTEMD_SERVICE }}" | sed -n '1,30p'
              else
                systemctl --user restart "${{ secrets.BOT_SYSTEMD_SERVICE }}"
                systemctl --user --no-pager --full status "${{ secrets.BOT_SYSTEMD_SERVICE }}" | sed -n '1,30p'
              fi
            fi
